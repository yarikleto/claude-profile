name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bats:
    name: bats (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zsh (Linux)
        # The completion tests syntax-check completions/claude-profile.zsh with
        # `zsh -n`. macOS ships zsh; ubuntu-latest does not.
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Install bats
        # apt's bats is 1.2.x, too old for $BATS_TEST_TMPDIR (added in 1.4).
        # Install a pinned modern release from source on every runner instead.
        run: |
          git clone --depth 1 --branch v1.11.0 \
            https://github.com/bats-core/bats-core.git "$RUNNER_TEMP/bats-core"
          sudo "$RUNNER_TEMP/bats-core/install.sh" /usr/local
          bats --version

      - name: Run test suite
        run: bats tests/

  # Keep the static "tests-N passing" badge in README.md honest by recounting
  # @test cases after the suite goes green on main and committing back if the
  # number drifted. Runs only on direct pushes to main (not PRs/forks).
  badge:
    name: update test-count badge
    needs: bats
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Recount tests and update badge
        run: |
          count=$(grep -rh '^@test' tests/*.bats | wc -l | tr -d ' ')
          echo "Test count: $count"
          sed -i -E "s/tests-[0-9]+%20passing/tests-${count}%20passing/" README.md
          if git diff --quiet README.md; then
            echo "Badge already up to date."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Update test-count badge to ${count} [skip ci]"
            git push
          fi
